<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Cadastro</title>
</head>

<body>

    <a href="index.html">Home</a>
    
    <h2>Informações Pessoais</h2>

    <form action="index.html">
        <fieldset>
            <legend>Cadastro do Cliente</legend>
            <p>
                Nome:
                <input type="text" placeholder="Digite o nome do cliente" size="40">
            </p>
            <p>
                Idade:
                <input type="text" placeholder="Digite a idade" size="10">
            </p>
            <p>
                Endereço:<br>
                <input type="text" placeholder="Digite o endereço" size="60">
            </p>
            <p>
                Cidade:
                <input type="text" placeholder="Digite a cidade" size="30">
            </p>
            <p>
                Estado:
                <input type="text" value="UF" size="5">
            </p>
            <p>
                CEP:
                <input type="text" value="XXXXX-XXX" size="10">
            </p>
            <p>
                Tel/Res:
                <input type="text" value="99 9999-9999" size="15">
            </p>
            <p>
                Tel/Cel:
                <input type="text" value="99 99999-9999" size="15">
            </p>
            <p>
                Email:<br>
                <input type="text" placeholder="Digite o endereço de email" size="60">
            </p>
        </fieldset>

        <button>Enviar</button>

    </form>

    <br>

</body>
</html>
